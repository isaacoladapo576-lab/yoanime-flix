<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="YoAnime.Flx — Premium Streaming">
    <title>YoAnime.Flx</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=14">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎌</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="nav-inner">
        <div class="nav-left">
            <a class="brand" href="#" onclick="goHome(); return false;">YoAnime<span style="color:white">.Flx</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="#" class="nav-link active" onclick="showSection('home'); return false;">Home</a></li>
                <li><a href="#" class="nav-link" onclick="showSection('anime'); return false;">Anime</a></li>
                <li><a href="#" class="nav-link" onclick="showSection('shows'); return false;">TV Shows</a></li>
                <li><a href="#" class="nav-link" onclick="showSection('movies'); return false;">Movies</a></li>
                <li><a href="#" class="nav-link" onclick="showSection('mylist'); return false;">My List</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <div class="search-wrap">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Titles, people, genres" oninput="handleSearch(this.value)" autocomplete="off">
                </div>
                <div class="search-overlay" id="search-overlay"></div>
            </div>
            <button class="hamburger" id="hamburger" onclick="toggleMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </div>

    <!-- Mobile menu dropdown -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="#" onclick="showSection('home'); closeMobileMenu(); return false;">Home</a>
        <a href="#" onclick="showSection('anime'); closeMobileMenu(); return false;">Anime</a>
        <a href="#" onclick="showSection('shows'); closeMobileMenu(); return false;">TV Shows</a>
        <a href="#" onclick="showSection('movies'); closeMobileMenu(); return false;">Movies</a>
        <a href="#" onclick="showSection('mylist'); closeMobileMenu(); return false;">My List</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="hero-section">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="hero-content">
        <div class="hero-badges" id="hero-badges"></div>
        <h1 class="hero-title" id="hero-title">Loading…</h1>
        <p class="hero-desc" id="hero-desc"></p>
        <div class="hero-actions">
            <button class="btn-play" id="hero-play-btn" onclick="playHero()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Play
            </button>
            <button class="btn-info" onclick="infoHero()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12.01" y2="16"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
                More Info
            </button>
        </div>
    </div>
</section>

<!-- MAIN CONTENT -->
<main class="main" id="main-content">
    
    <!-- My List row -->
    <section class="content-section" id="mylist-section" style="display:none;">
        <div class="section-header">
            <h2 class="section-title">My List</h2>
        </div>
        <div class="row-wrap">
            <button class="row-btn row-btn-left" onclick="scrollRow('mylist-row',-1)">❮</button>
            <div class="content-row" id="mylist-row"></div>
            <button class="row-btn row-btn-right" onclick="scrollRow('mylist-row',1)">❯</button>
        </div>
    </section>

    <!-- Trending row -->
    <section class="content-section" id="trending-section">
        <div class="section-header">
            <h2 class="section-title">Trending Now</h2>
        </div>
        <div class="row-wrap">
            <button class="row-btn row-btn-left" onclick="scrollRow('trending-row',-1)">❮</button>
            <div class="content-row" id="trending-row"></div>
            <button class="row-btn row-btn-right" onclick="scrollRow('trending-row',1)">❯</button>
        </div>
    </section>

    <!-- Top Anime -->
    <section class="content-section" id="anime-section">
        <div class="section-header">
            <h2 class="section-title">Popular Anime</h2>
        </div>
        <div class="row-wrap">
            <button class="row-btn row-btn-left" onclick="scrollRow('anime-row',-1)">❮</button>
            <div class="content-row" id="anime-row"></div>
            <button class="row-btn row-btn-right" onclick="scrollRow('anime-row',1)">❯</button>
        </div>
    </section>

    <!-- Top Shows -->
    <section class="content-section" id="shows-section">
        <div class="section-header">
            <h2 class="section-title">TV Shows</h2>
        </div>
        <div class="row-wrap">
            <button class="row-btn row-btn-left" onclick="scrollRow('shows-row',-1)">❮</button>
            <div class="content-row" id="shows-row"></div>
            <button class="row-btn row-btn-right" onclick="scrollRow('shows-row',1)">❯</button>
        </div>
    </section>

    <!-- Top Movies -->
    <section class="content-section" id="movies-section">
        <div class="section-header">
            <h2 class="section-title">Blockbuster Movies</h2>
        </div>
        <div class="row-wrap">
            <button class="row-btn row-btn-left" onclick="scrollRow('movies-row',-1)">❮</button>
            <div class="content-row" id="movies-row"></div>
            <button class="row-btn row-btn-right" onclick="scrollRow('movies-row',1)">❯</button>
        </div>
    </section>
</main>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="item-modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-hero">
            <img class="modal-hero-bg" id="modal-backdrop" src="" alt="">
            <div class="modal-hero-overlay">
                <div>
                    <h2 class="modal-title" id="modal-title">Title</h2>
                    <div class="hero-actions">
                        <button class="btn-play" onclick="playModal()">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            Play
                        </button>
                        <button class="btn-info" id="modal-list-btn" onclick="toggleMyList(modalItem.id)">+ My List</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="modal-meta">
                <span class="modal-rating" id="modal-rating">0.0 Match</span>
                <span id="modal-year">2024</span>
                <span class="badge" id="modal-type">TV</span>
            </div>
            <p class="modal-desc" id="modal-desc">Description</p>
            
            <div id="episodes-container" style="display:none; margin-top:24px;">
                <select class="season-selector" id="modal-season-select" onchange="onSeasonChange(this.value)">
                    <option value="1">Season 1</option>
                </select>
                <div class="episodes-grid" id="modal-episodes"></div>
            </div>
        </div>
    </div>
</div>

<!-- FULLSCREEN PLAYER -->
<div id="player-page" style="display:none; position:fixed; inset:0; z-index:9999; background:#000; flex-direction:column;">
    <div class="player-header">
        <button class="btn-back" onclick="closePlayer()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            Back
        </button>
        <div style="flex:1; text-align:center; font-weight:600; font-size:1.1rem; color:white;" id="player-title"></div>
        <div style="display:flex; gap:16px; align-items:center;">
            <div class="custom-dropdown" id="server-dropdown">
                <div class="dropdown-selected" onclick="toggleDropdown()">
                    <span id="server-selected">Server</span>
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="dropdown-options" id="server-options"></div>
            </div>
            <button id="dub-toggle-btn" class="custom-btn" style="display:none" onclick="toggleDub()">Sub</button>
        </div>
    </div>
    
    <div style="position:relative; flex:1; width:100%; height:100%; background:#000;">
        <div id="player-loading" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:white; z-index:1;">
            <div style="text-align:center;">
                <div class="skeleton" style="width:40px; height:40px; border-radius:50%; margin:0 auto 10px;"></div>
                <div id="loading-text" style="color:var(--text-secondary); font-size:0.875rem;">Loading stream...</div>
            </div>
        </div>
        <iframe id="player-iframe" src="" allowfullscreen allow="autoplay; fullscreen" style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:2;"></iframe>
    </div>
    
    <div id="episode-nav" style="display:none; padding:16px; background:#0a0a0a; border-top:1px solid #262626; align-items:center; justify-content:space-between; flex-shrink:0;">
        <button class="btn-info" onclick="prevEpisode()">Previous</button>
        <span id="episode-indicator" style="color:white; font-weight:600;">S1:E1</span>
        <button class="btn-info" onclick="nextEpisode()">Next</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="stream-sources.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
